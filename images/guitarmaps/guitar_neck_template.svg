
<svg width="200" height="700" viewBox="0 0 200 700" xmlns="http://www.w3.org/2000/svg">
  <!--- string tuning -->
  <text text-anchor="middle" font-family="sans-serif" x="18" y="10" font-size="10" fill="#000000" >E</text>
  <text text-anchor="middle" font-family="sans-serif" x="45" y="10" font-size="10" fill="#000000" >A</text>
  <text text-anchor="middle" font-family="sans-serif" x="72" y="10" font-size="10" fill="#000000" >D</text>

  <text text-anchor="middle" font-family="sans-serif" x="98" y="10" font-size="10" fill="#000000" >G</text>
  <text text-anchor="middle" font-family="sans-serif" x="125" y="10" font-size="10" fill="#000000" >B</text>
  <text text-anchor="middle" font-family="sans-serif" x="152" y="10" font-size="10" fill="#000000" >e</text>

  <!-- the neck and warp -->
  <rect id="neck" x="10" y="15" width="150" height="670" fill="#fff79f" stroke="#cccccc" stroke-width="1"/>
  <line id="the_warp" x1="111" y1="15" x2="111" y2="685" stroke="#ffb7b7" stroke-width="5" stroke-dasharray="10 3" />

  <!-- dots -->
  <circle id="fret_3_dot" cx="85" cy="137" r="6" fill="#000000" />
  <circle id="fret_5_dot" cx="85" cy="249" r="6" fill="#000000" />
  <circle id="fret_7_dot" cx="85" cy="359" r="6" fill="#000000" />
  <circle id="fret_9_dot" cx="85" cy="469" r="6" fill="#000000" />
  <circle id="fret_12_dot_left" cx="58" cy="634" r="6" fill="#000000" />
  <circle id="fret_12_dot_right" cx="112" cy="634" r="6" fill="#000000" />

  <!-- frets -->
  <line id="nut" x1="10" y1="15" x2="160" y2="15" stroke="#000000" stroke-width="8"/>

  <line id="fret01" x1="10" y1="56" x2="160" y2="56" stroke="#000000" stroke-width="1.5"/>
  <line id="fret02" x1="10" y1="111" x2="160" y2="111" stroke="#000000" stroke-width="1.5"/>
  <line id="fret03" x1="10" y1="166" x2="160" y2="166" stroke="#000000" stroke-width="1.5"/>
  <line id="fret04" x1="10" y1="221" x2="160" y2="221" stroke="#000000" stroke-width="1.5"/>
  <line id="fret05" x1="10" y1="276" x2="160" y2="276" stroke="#000000" stroke-width="1.5"/>
  <line id="fret06" x1="10" y1="331" x2="160" y2="331" stroke="#000000" stroke-width="1.5"/>
  <line id="fret07" x1="10" y1="386" x2="160" y2="386" stroke="#000000" stroke-width="1.5"/>
  <line id="fret08" x1="10" y1="441" x2="160" y2="441" stroke="#000000" stroke-width="1.5"/>
  <line id="fret09" x1="10" y1="496" x2="160" y2="496" stroke="#000000" stroke-width="1.5"/>
  <line id="fret10" x1="10" y1="551" x2="160" y2="551" stroke="#000000" stroke-width="1.5"/>
  <line id="fret11" x1="10" y1="606" x2="160" y2="606" stroke="#000000" stroke-width="1.5"/>
  <line id="fret12" x1="10" y1="661" x2="160" y2="661" stroke="#000000" stroke-width="1.5"/>

  <!-- Thin black grid lines -->
  <line id="e_string" x1="18" y1="15" x2="18" y2="685" stroke="#000000" stroke-width="0.5"/>
  <line id="a_string" x1="45" y1="15" x2="45" y2="685" stroke="#000000" stroke-width="0.5"/>
  <line id="d_string" x1="72" y1="15" x2="72" y2="685" stroke="#000000" stroke-width="0.5"/>

  <line id="g_string" x1="98" y1="15" x2="98" y2="685" stroke="#000000" stroke-width="0.5"/>
  <line id="b_string" x1="125" y1="15" x2="125" y2="685" stroke="#000000" stroke-width="0.5"/>
  <line id="e_string_2" x1="152" y1="15" x2="152" y2="685" stroke="#000000" stroke-width="0.5"/>

</svg>

<!--
The text Element
The text element renders text at a specific position. Its core attributes are:

x: The x-coordinate of the text's anchor point.
y: The y-coordinate of the text's baseline (not the top of the text).
SVG text inherits standard font-related CSS properties and presentation attributes, including font-family, font-size, font-weight, font-style, and fill (to set the text color).


-->
